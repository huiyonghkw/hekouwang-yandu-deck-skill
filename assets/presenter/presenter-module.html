<!-- ════════ 放映 / 提词器模块 v2 · 演读 DECK（自包含，粘在引擎结束标签前）════════
  按 S：开「讲者视图」。优先开**同一 deck 的独立窗口**（url + #speaker），主屏与讲者窗靠
       BroadcastChannel 双向同步——主屏保持干净（投影/录屏），讲者窗显示计时器 + 当前镜逐字稿 + 下一镜。
       讲者窗还能**反向遥控**主屏：在讲者窗按 ←/→ 翻镜、P 计时、R 归零、Esc/S 关。
       弹窗被拦（或无 BroadcastChannel）时，自动回退为**页内全屏浮层**（单屏排练也能用）。
  真·双屏用法：把 deck 在第二显示器再开一个窗口、手动在地址后加 #speaker 也能变讲者窗（免弹窗）。
  逐字稿写进每张 slide 的 <div class="notes">…</div>（观众/录屏永不可见，强制 display:none）——
       这份 notes 同时就是该镜的「配音 / 口播脚本」，录屏时主屏放干净 deck、讲者窗当提词器照念，或喂 TTS。
  引擎依赖：#deck 容器、.slide（当前镜带 .active class）；遥控翻镜靠向引擎派发方向键事件，无需改引擎。
  注意：本地 file:// 下 BroadcastChannel 跨窗不通——用 python3 -m http.server 预览；发布到 CF Pages 正常。 -->
<style>
.notes{display:none!important}
#pmode{position:fixed;inset:0;z-index:99999;display:none;flex-direction:column;gap:18px;padding:30px 38px;background:#0c0d10;color:#ececf2;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans SC',system-ui,sans-serif}
#pmode.on{display:flex}
#pmode .pm-top{display:flex;align-items:center;gap:18px;border-bottom:1px solid rgba(255,255,255,.12);padding-bottom:16px}
#pmode .pm-time{font-variant-numeric:tabular-nums;font-size:44px;font-weight:700}
#pmode .pm-btn{cursor:pointer;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);color:#ececf2;border-radius:10px;padding:9px 15px;font-size:14px}
#pmode .pm-count{margin-left:auto;font-size:17px;color:#9a9aac;font-variant-numeric:tabular-nums}
#pmode .pm-hint{font-size:12px;color:#6c6c7e}
#pmode .pm-body{flex:1;display:grid;grid-template-columns:1.7fr 1fr;gap:24px;min-height:0}
#pmode .pm-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:24px 28px;overflow:auto}
#pmode .pm-lbl{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#7c7c8e;margin-bottom:12px}
#pmode .pm-now{font-size:29px;line-height:1.62;font-weight:500;white-space:pre-wrap}
#pmode .pm-nt{font-size:21px;font-weight:700;margin-bottom:8px}
#pmode .pm-ns{font-size:17px;line-height:1.6;color:#b6b6c6;white-space:pre-wrap}
</style>
<div id="pmode" aria-hidden="true">
  <div class="pm-top">
    <div class="pm-time" id="pmTime">00:00</div>
    <button class="pm-btn" id="pmPlay">▶/⏸ 计时 (P)</button>
    <button class="pm-btn" id="pmReset">↺ 归零 (R)</button>
    <span class="pm-hint">S 开/关 · ←/→ 翻镜 · Esc 关</span>
    <div class="pm-count" id="pmCount">1 / 1</div>
  </div>
  <div class="pm-body">
    <div class="pm-card"><div class="pm-lbl">当前镜 · 逐字稿</div><div class="pm-now" id="pmNow"></div></div>
    <div class="pm-card"><div class="pm-lbl">下一镜</div><div class="pm-nt" id="pmNextT"></div><div class="pm-ns" id="pmNextS"></div></div>
  </div>
</div>
<script>
(function(){
  var deck=document.getElementById('deck'); if(!deck) return;
  var slides=[].slice.call(deck.querySelectorAll('.slide'));
  /* 讲者信号用 window.name（window.open 设定，引擎动不了）+ ?speaker 查询串（引擎只改 hash 不改 search）；
     不用 #speaker——引擎的深链 replaceState('#'+n) 会在本模块读取前把它冲掉。 */
  var isSpeaker=(window.name==='pmodeWin')||/(?:^|[?&])speaker(?:=|&|$)/.test(location.search);
  var bc=null; try{ bc=new BroadcastChannel('pmode:'+location.pathname); }catch(e){}
  function E(id){ return document.getElementById(id); }
  function notesOf(s){ var n=s&&s.querySelector('.notes'); return n?n.textContent.replace(/[ \t]+\n/g,'\n').trim():''; }
  function titleOf(s){ var t=s&&s.querySelector('h1,h2,.t,.k,.lead,.eyebrow'); return t?t.textContent.trim().slice(0,80):'（无标题）'; }
  function curIdx(){ for(var i=0;i<slides.length;i++) if(slides[i].classList.contains('active')) return i; return 0; }
  function paint(st){
    if(E('pmCount')) E('pmCount').textContent=(st.idx+1)+' / '+st.total;
    if(E('pmNow'))   E('pmNow').textContent=st.now;
    if(E('pmNextT')) E('pmNextT').textContent=st.nt;
    if(E('pmNextS')) E('pmNextS').textContent=st.ns;
  }
  function setTime(txt){ var e=E('pmTime'); if(e) e.textContent=txt; }
  function fmt(ms){ var s=Math.floor(ms/1000); return ('0'+Math.floor(s/60)).slice(-2)+':'+('0'+(s%60)).slice(-2); }

  /* ===================== 讲者角色（独立窗口 / #speaker）===================== */
  if(isSpeaker){
    var pm=E('pmode'); pm.classList.add('on');
    if(bc){
      bc.onmessage=function(ev){ var m=ev.data||{}; if(m.t==='state') paint(m.st); else if(m.t==='time') setTime(m.text); };
      bc.postMessage({t:'hello'});   /* 上线即请求当前态 */
    } else {
      if(E('pmNow')) E('pmNow').textContent='（此环境不支持 BroadcastChannel，讲者窗需 http(s) 或改用页内浮层）';
    }
    function send(cmd){ if(bc) bc.postMessage({t:'cmd',cmd:cmd}); }
    document.addEventListener('keydown',function(e){
      var k=e.key,cmd=null;
      if(k==='ArrowRight'||k==='ArrowDown'||k===' '||k==='PageDown'||k==='Enter') cmd='next';
      else if(k==='ArrowLeft'||k==='ArrowUp'||k==='PageUp') cmd='prev';
      else if(k==='p'||k==='P') cmd='timer'; else if(k==='r'||k==='R') cmd='reset';
      else if(k==='Escape'||k==='s'||k==='S') cmd='close';
      if(cmd){ e.preventDefault(); send(cmd); if(cmd==='close') window.close(); }
    });
    E('pmPlay').addEventListener('click',function(){ send('timer'); });
    E('pmReset').addEventListener('click',function(){ send('reset'); });
    return;   /* 讲者角色不跑主屏逻辑 */
  }

  /* ===================== 主屏（presenter）角色 ===================== */
  var pm=E('pmode'), win=null, local=false;
  function isWin(){ return win && !win.closed; }
  function shown(){ return isWin() || local; }
  function state(){
    var i=curIdx(), nx=slides[i+1];
    return { idx:i, total:slides.length,
      now: notesOf(slides[i])||('（本镜无逐字稿）\n— '+titleOf(slides[i])),
      nt: nx?titleOf(nx):'—— 末镜 ——', ns: nx?(notesOf(nx)||'（无逐字稿）'):'' };
  }
  function pushState(){ var st=state(); if(bc) bc.postMessage({t:'state',st:st}); if(local) paint(st); }

  var t0=null,acc=0,tick=null;
  function timeText(){ return fmt(acc+(t0?Date.now()-t0:0)); }
  function pushTime(){ var tx=timeText(); if(bc) bc.postMessage({t:'time',text:tx}); if(local) setTime(tx); }
  function play(){ if(t0)return; t0=Date.now(); tick=setInterval(pushTime,250); pushTime(); }
  function pause(){ if(!t0)return; acc+=Date.now()-t0; t0=null; clearInterval(tick); pushTime(); }
  function reset(){ pause(); acc=0; pushTime(); }
  function toggleTimer(){ t0?pause():play(); }
  window.__pmode={ toggleTimer:toggleTimer, reset:reset };

  var mo=new MutationObserver(function(){ pushState(); });
  slides.forEach(function(s){ mo.observe(s,{attributes:true,attributeFilter:['class']}); });

  function nav(dir){ document.dispatchEvent(new KeyboardEvent('keydown',{key:dir>0?'ArrowRight':'ArrowLeft',bubbles:true})); }

  function openSpeaker(){
    var q=location.search?location.search+'&speaker=1':'?speaker=1';
    var url=location.pathname+q+location.hash;
    win = bc ? window.open(url,'pmodeWin','width=840,height=960') : null;
    if(!win){ local=true; pm.classList.add('on'); }   /* 弹窗被拦 / 无广播 → 页内浮层 */
    if(!t0) play();
    pushState(); pushTime();
    setTimeout(function(){ pushState(); pushTime(); }, 400);   /* 等子窗加载完再补推一次 */
  }
  function closeSpeaker(){ if(isWin()) win.close(); win=null; local=false; pm.classList.remove('on'); }
  function toggle(){ shown()?closeSpeaker():openSpeaker(); }

  if(bc){ bc.onmessage=function(ev){ var m=ev.data||{};
    if(m.t==='hello'){ pushState(); pushTime(); }
    else if(m.t==='cmd'){
      if(m.cmd==='next') nav(1);
      else if(m.cmd==='prev') nav(-1);
      else if(m.cmd==='timer') toggleTimer();
      else if(m.cmd==='reset') reset();
      else if(m.cmd==='close') closeSpeaker();
    }
  }; }

  E('pmPlay').addEventListener('click',function(e){ e.stopPropagation(); toggleTimer(); });
  E('pmReset').addEventListener('click',function(e){ e.stopPropagation(); reset(); });
  document.addEventListener('keydown',function(e){
    var k=e.key;
    if(k==='s'||k==='S'){ e.preventDefault(); toggle(); }
    else if(shown()&&(k==='p'||k==='P')){ e.preventDefault(); toggleTimer(); }
    else if(shown()&&(k==='r'||k==='R')){ e.preventDefault(); reset(); }
    else if(shown()&&k==='Escape'){ e.preventDefault(); closeSpeaker(); }
  });
  window.addEventListener('beforeunload',function(){ if(isWin()) win.close(); });
})();
</script>
